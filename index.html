<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur loyer – Challenges</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<style>
  :root {
    --challenges-red: #f43423;
    --challenges-dark: #1a1a1a;
    --challenges-mid: #444;
    --challenges-light: #f5f3f0;
    --challenges-border: #e0dbd5;
    --green: #1a7a4a;
    --orange: #d4580a;
    --font-display: 'Lora', serif;
    --font-body: 'Lora', serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--challenges-light);
    color: var(--challenges-dark);
    min-height: 100vh;
  }

  /* Main container */
  .container {
    max-width: 680px;
    margin: 48px auto;
    padding: 0 20px 60px;
  }

  /* Title block */
  .title-block {
    margin-bottom: 40px;
  }
  .kicker {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--challenges-red);
    margin-bottom: 12px;
  }
  .main-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 900;
    line-height: 1.1;
    color: var(--challenges-red);
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 16px;
    color: var(--challenges-mid);
    line-height: 1.6;
    font-weight: 300;
  }

  /* Form card */
  .form-card {
    background: white;
    border: 1px solid var(--challenges-border);
    border-radius: 4px;
    padding: 36px;
    margin-bottom: 24px;
  }

  .field-group {
    margin-bottom: 28px;
  }
  .field-group:last-child { margin-bottom: 0; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--challenges-mid);
    margin-bottom: 8px;
  }

  select, input[type="number"] {
    width: 100%;
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 400;
    color: var(--challenges-dark);
    background: var(--challenges-light);
    border: 1.5px solid var(--challenges-border);
    border-radius: 3px;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    transition: border-color 0.15s;
    outline: none;
  }
  select:focus, input[type="number"]:focus {
    border-color: var(--challenges-dark);
  }
  input[type="number"]::placeholder { color: #bbb; font-weight: 300; }

  .select-wrapper {
    position: relative;
  }
  .select-wrapper::after {
    content: '▾';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--challenges-mid);
    pointer-events: none;
  }

  .type-toggle {
    display: flex;
    gap: 0;
    border: 1.5px solid var(--challenges-border);
    border-radius: 3px;
    overflow: hidden;
  }
  .type-toggle input[type="radio"] { display: none; }
  .type-toggle label {
    flex: 1;
    text-align: center;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0;
    text-transform: none;
    color: var(--challenges-mid);
    cursor: pointer;
    background: var(--challenges-light);
    transition: all 0.15s;
    margin: 0;
    border: none;
  }
  .type-toggle input[type="radio"]:checked + label {
    background: var(--challenges-red);
    color: white;
  }

  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

  .input-unit {
    position: relative;
  }
  .input-unit input { padding-right: 48px; }
  .unit-label {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    font-weight: 500;
    color: var(--challenges-mid);
    pointer-events: none;
  }

  .btn-simulate {
    width: 100%;
    padding: 18px;
    background: var(--challenges-red);
    color: white;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }
  .btn-simulate:hover { background: #d42f1f; }
  .btn-simulate:disabled { background: #ccc; cursor: not-allowed; }

  /* Result card */
  .result-card {
    display: none;
    background: white;
    border: 1px solid var(--challenges-border);
    border-radius: 4px;
    overflow: hidden;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-banner {
    padding: 28px 36px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .result-banner.above { background: #fff5f4; border-bottom: 3px solid var(--challenges-red); }
  .result-banner.below { background: #f4fff8; border-bottom: 3px solid var(--green); }
  .result-banner.equal { background: #fffbf4; border-bottom: 3px solid #d4a00a; }

  .result-icon {
    font-size: 40px;
    line-height: 1;
    flex-shrink: 0;
  }

  .result-verdict {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .result-verdict.above { color: var(--challenges-red); }
  .result-verdict.below { color: var(--green); }
  .result-verdict.equal { color: #d4a00a; }

  .result-detail {
    font-size: 14px;
    color: var(--challenges-mid);
    line-height: 1.5;
  }

  .result-stats {
    padding: 28px 36px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    border-bottom: 1px solid var(--challenges-border);
  }
  .stat-item { text-align: center; }
  .stat-value {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 700;
    color: var(--challenges-dark);
    display: block;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--challenges-mid);
  }
  .stat-item.highlight .stat-value { color: var(--challenges-red); }

  /* Bar visual */
  .result-bar-section {
    padding: 24px 36px 32px;
  }
  .bar-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--challenges-mid);
    margin-bottom: 16px;
  }
  .bar-container { position: relative; height: 36px; }
  .bar-track {
    height: 8px;
    background: var(--challenges-border);
    border-radius: 4px;
    position: absolute;
    left: 0; right: 0; top: 50%;
    transform: translateY(-50%);
  }
  .bar-fill {
    height: 8px;
    border-radius: 4px;
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    transition: width 0.6s ease;
  }
  .bar-fill.above { background: var(--challenges-red); }
  .bar-fill.below { background: var(--green); }
  .bar-fill.equal { background: #d4a00a; }

  .bar-marker {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
  }
  .bar-marker-line {
    width: 2px;
    height: 36px;
    background: var(--challenges-dark);
    margin: 0 auto;
    opacity: 0.4;
  }
  .bar-marker-label {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    font-weight: 600;
    color: var(--challenges-mid);
    white-space: nowrap;
  }

  .bar-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 11px;
    color: var(--challenges-mid);
    font-weight: 500;
  }

  /* Autocomplete */
  .autocomplete-wrapper { position: relative; }
  #input-quartier-search {
    width: 100%;
    padding: 14px 16px;
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 400;
    color: var(--challenges-dark);
    background: var(--challenges-light);
    border: 1.5px solid var(--challenges-border);
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
  }
  #input-quartier-search:focus { border-color: var(--challenges-dark); }
  #input-quartier-search:disabled { opacity: 0.5; cursor: not-allowed; }
  #input-quartier-search::placeholder { color: #bbb; font-weight: 300; }

  .autocomplete-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: white;
    border: 1.5px solid var(--challenges-dark);
    border-radius: 3px;
    max-height: 260px;
    overflow-y: auto;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  }
  .autocomplete-dropdown.open { display: block; }

  .ac-group-header {
    padding: 8px 14px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--challenges-red);
    background: white;
    position: sticky;
    top: 0;
    border-bottom: 1px solid var(--challenges-border);
  }
  .ac-item {
    padding: 10px 14px 10px 20px;
    font-size: 14px;
    cursor: pointer;
    color: var(--challenges-dark);
    transition: background 0.1s;
  }
  .ac-item:hover, .ac-item.highlighted { background: var(--challenges-light); }
  .ac-item.selected { background: #fff5f4; font-weight: 500; }
  .ac-item mark { background: none; color: var(--challenges-red); font-weight: 600; }

  /* Source note */
  .source-note {
    margin-top: 16px;
    font-size: 11px;
    color: #999;
    text-align: center;
    padding: 0 36px;
    padding-bottom: 20px;
    line-height: 1.5;
  }

  .no-data-msg {
    padding: 24px 36px;
    color: var(--challenges-mid);
    font-size: 14px;
    font-style: italic;
  }

  @media (max-width: 520px) {
    .form-card { padding: 24px 20px; }
    .row-2 { grid-template-columns: 1fr; }
    .result-stats { grid-template-columns: 1fr 1fr; }
    .result-banner { padding: 20px; }
    .result-bar-section { padding: 16px 20px 24px; }
    .result-stats { padding: 20px; }
    .source-note { padding: 0 20px 16px; }
  }
</style>
</head>

<div class="container">

  <div class="title-block">
    <h1 class="main-title">Payez-vous votre loyer trop cher ?</h1>
    <p class="subtitle">Renseignez votre ville, votre quartier et vos conditions de location pour savoir si votre loyer est dans la moyenne du marché.</p>
  </div>

    </div>

    <div class="field-group">

        <div class="autocomplete-dropdown" id="autocomplete-dropdown"></div>
      </div>
      <input type="hidden" id="select-quartier" value="">
    </div>

    <div class="row-2">
      <div class="field-group">
        <label for="input-loyer">Loyer mensuel</label>
        <div class="input-unit">
          <input type="number" id="input-loyer" placeholder="ex. 950" min="1" max="20000">
          <span class="unit-label">€</span>
        </div>
      </div>
      <div class="field-group">
        <label for="input-surface">Surface</label>
        <div class="input-unit">
          <input type="number" id="input-surface" placeholder="ex. 45" min="1" max="1000">
          <span class="unit-label">m²</span>
        </div>
      </div>
    </div>

    <button class="btn-simulate" id="btn-simulate" onclick="simulate()" disabled>Calculer</button>
  </div>

  <div class="result-card" id="result-card">
    <!-- filled by JS -->
  </div>

</div>

// Sort cities alphabetically
DATA.sort((a,b) => a.ville.localeCompare(b.ville, 'fr'));

const selVille = document.getElementById('select-ville');
const hiddenQuartier = document.getElementById('select-quartier');
const searchInput = document.getElementById('input-quartier-search');
const dropdown = document.getElementById('autocomplete-dropdown');
const btnSim = document.getElementById('btn-simulate');

let currentItems = []; // {value, label, group}
let selectedValue = '';

// Populate city dropdown
DATA.forEach(city => {
  const opt = document.createElement('option');
  opt.value = city.ville;
  opt.textContent = city.ville;
  selVille.appendChild(opt);
});

function getGroupLabel(cp, ville) {
  // Paris: group by arrondissement (75001 → "1er arrondissement")
  if (cp >= 75001 && cp <= 75020) {
    const arr = cp - 75000;
    return arr === 1 ? `${arr}er arrondissement` : `${arr}e arrondissement`;
  }
  // Marseille: group by arrondissement (13001 → "1er arr.")
  if (cp >= 13001 && cp <= 13016) {
    const arr = cp - 13000;
    return arr === 1 ? `${arr}er arrondissement` : `${arr}e arrondissement`;
  }
  // Lyon: group by arrondissement (69001-69009)
  if (cp >= 69001 && cp <= 69009) {
    const arr = cp - 69000;
    return arr === 1 ? `${arr}er arrondissement` : `${arr}e arrondissement`;
  }
  return null; // no grouping
}

function buildItems(cityData, typeField) {
  const field = typeField === 'appart' ? 'loyer_appart' : 'loyer_maison';
  const items = [];

  // City-wide average always first
  items.push({ value: '__ville__', label: `${cityData.ville} — moyenne toute la ville`, group: null });

  // Group quartiers by CP
  const groups = {};
  cityData.quartiers.forEach(q => {
    if (q[field] === null) return;
    const g = getGroupLabel(q.cp, cityData.ville) || 'Quartiers';
    if (!groups[g]) groups[g] = [];
    groups[g].push({ value: q.nom, label: q.nom, group: g });
  });

  Object.entries(groups).forEach(([gName, gItems]) => {
    gItems.forEach(item => items.push(item));
  });

  return items;
}

function renderDropdown(items, query) {
  dropdown.innerHTML = '';
  const q = query.toLowerCase().trim();

  let lastGroup = null;
  let count = 0;

  items.forEach(item => {
    const match = !q || item.label.toLowerCase().includes(q);
    if (!match) return;
    count++;

    if (item.group && item.group !== lastGroup) {
      const header = document.createElement('div');
      header.className = 'ac-group-header';
      header.textContent = item.group;
      dropdown.appendChild(header);
      lastGroup = item.group;
    }

    const div = document.createElement('div');
    div.className = 'ac-item' + (item.value === selectedValue ? ' selected' : '');

    if (q) {
      const idx = item.label.toLowerCase().indexOf(q);
      if (idx >= 0) {
        div.innerHTML = item.label.slice(0, idx) +
          '<mark>' + item.label.slice(idx, idx + q.length) + '</mark>' +
          item.label.slice(idx + q.length);
      } else {
        div.textContent = item.label;
      }
    } else {
      div.textContent = item.label;
    }

    div.addEventListener('mousedown', (e) => {
      e.preventDefault();
      selectItem(item);
    });
    dropdown.appendChild(div);
  });

  dropdown.classList.toggle('open', count > 0);
}

function selectItem(item) {
  selectedValue = item.value;
  hiddenQuartier.value = item.value;
  searchInput.value = item.label;
  dropdown.classList.remove('open');
  checkReady();
}

function resetQuartier() {
  selectedValue = '';
  hiddenQuartier.value = '';
  searchInput.value = '';
  dropdown.classList.remove('open');
  checkReady();
}

selVille.addEventListener('change', () => {
  const ville = selVille.value;
  resetQuartier();
  if (!ville) {
    searchInput.disabled = true;
    searchInput.placeholder = '— Sélectionnez d\'abord une ville —';
    currentItems = [];
    return;
  }
  const cityData = DATA.find(c => c.ville === ville);
  const typeField = document.querySelector('input[name="type-bien"]:checked').value;
  currentItems = buildItems(cityData, typeField);
  searchInput.disabled = false;
  searchInput.placeholder = 'Tapez pour filtrer ou parcourez la liste…';
});

searchInput.addEventListener('focus', () => {
  if (currentItems.length) renderDropdown(currentItems, searchInput.value);
});

searchInput.addEventListener('input', () => {
  selectedValue = '';
  hiddenQuartier.value = '';
  renderDropdown(currentItems, searchInput.value);
  checkReady();
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => dropdown.classList.remove('open'), 150);
});

document.querySelectorAll('input[name="type-bien"]').forEach(radio => {
  radio.addEventListener('change', () => {
    const ville = selVille.value;
    if (ville) {
      const cityData = DATA.find(c => c.ville === ville);
      const typeField = document.querySelector('input[name="type-bien"]:checked').value;
      currentItems = buildItems(cityData, typeField);
      // Reset quartier if it no longer has data
      if (selectedValue && selectedValue !== '__ville__') {
        const field = typeField === 'appart' ? 'loyer_appart' : 'loyer_maison';
        const q = cityData.quartiers.find(x => x.nom === selectedValue);
        if (!q || q[field] === null) resetQuartier();
      }
    }
    checkReady();
  });
});

document.getElementById('input-loyer').addEventListener('input', checkReady);
document.getElementById('input-surface').addEventListener('input', checkReady);

function checkReady() {
  const loyer = parseFloat(document.getElementById('input-loyer').value);
  const surface = parseFloat(document.getElementById('input-surface').value);
  const ville = selVille.value;
  const quartier = hiddenQuartier.value;
  btnSim.disabled = !(ville && quartier && loyer > 0 && surface > 0);
}

function simulate() {
  const ville = selVille.value;
  const quartierNom = hiddenQuartier.value;
  const loyer = parseFloat(document.getElementById('input-loyer').value);
  const surface = parseFloat(document.getElementById('input-surface').value);
  const type = document.querySelector('input[name="type-bien"]:checked').value;

  const loyerM2 = loyer / surface;
  const cityData = DATA.find(c => c.ville === ville);
  const field = type === 'appart' ? 'loyer_appart' : 'loyer_maison';

  let reference, referenceLabel;
  if (quartierNom === '__ville__') {
    reference = type === 'appart' ? cityData.avg_appart : cityData.avg_maison;
    referenceLabel = `moyenne de ${ville}`;
  } else {
    const q = cityData.quartiers.find(x => x.nom === quartierNom);
    reference = q ? q[field] : null;
    referenceLabel = `moyenne du quartier ${quartierNom}`;
  }

  if (!reference) { showNoData(); return; }

  const diff = loyerM2 - reference;
  const diffPct = (diff / reference) * 100;
  const threshold = 5;

  let status, icon, verdictText, detailText;
  if (diffPct > threshold) {
    status = 'above'; icon = '⚠️';
    verdictText = 'Vous payez plus cher que la moyenne';
    detailText = `Votre loyer est <strong>${diffPct > 0 ? '+' : ''}${diffPct.toFixed(1)}%</strong> au-dessus de la ${referenceLabel} (${reference.toFixed(2)} €/m²).`;
  } else if (diffPct < -threshold) {
    status = 'below'; icon = '✅';
    verdictText = 'Vous êtes en dessous du marché';
    detailText = `Votre loyer est <strong>${diffPct.toFixed(1)}%</strong> en dessous de la ${referenceLabel} (${reference.toFixed(2)} €/m²). Bonne affaire.`;
  } else {
    status = 'equal'; icon = '🎯';
    verdictText = 'Vous êtes dans la moyenne';
    detailText = `Votre loyer correspond à la ${referenceLabel} (${reference.toFixed(2)} €/m²).`;
  }

  const min = Math.min(loyerM2, reference) * 0.7;
  const max = Math.max(loyerM2, reference) * 1.15;
  const range = max - min;
  const userPct = Math.min(95, Math.max(5, ((loyerM2 - min) / range) * 100));
  const refPct = Math.min(95, Math.max(5, ((reference - min) / range) * 100));

  const resultCard = document.getElementById('result-card');
  resultCard.style.display = 'block';
  resultCard.innerHTML = `
    <div class="result-banner ${status}">
      <div class="result-icon">${icon}</div>
      <div>
        <div class="result-verdict ${status}">${verdictText}</div>
        <div class="result-detail">${detailText}</div>
      </div>
    </div>
    <div class="result-stats">
      <div class="stat-item highlight">
        <span class="stat-value">${loyerM2.toFixed(2)} €</span>
        <span class="stat-label">Votre loyer/m²</span>
      </div>
      <div class="stat-item">
        <span class="stat-value">${reference.toFixed(2)} €</span>
        <span class="stat-label">Moyenne marché</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" style="color:${status==='above'?'var(--challenges-red)':status==='below'?'var(--green)':'#d4a00a'}">${diff > 0 ? '+' : ''}${diff.toFixed(2)} €</span>
        <span class="stat-label">Écart /m²</span>
      </div>
    </div>
    <div class="result-bar-section">
      <div class="bar-title">Positionnement de votre loyer</div>
      <div class="bar-container">
        <div class="bar-track"></div>
        <div class="bar-fill ${status}" style="width: ${Math.max(userPct, refPct)}%"></div>
        <div class="bar-marker" style="left: ${refPct}%">
          <div class="bar-marker-label">Référence</div>
          <div class="bar-marker-line"></div>
        </div>
        <div class="bar-marker" style="left: ${userPct}%">
          <div class="bar-marker-label" style="color:${status==='above'?'var(--challenges-red)':status==='below'?'var(--green)':'#d4a00a'}">Vous</div>
          <div class="bar-marker-line" style="opacity:0.8;background:${status==='above'?'var(--challenges-red)':status==='below'?'var(--green)':'#d4a00a'}"></div>
        </div>
      </div>
      <div class="bar-labels">
        <span>${min.toFixed(1)} €/m²</span>
        <span>${max.toFixed(1)} €/m²</span>
      </div>
    </div>
    <div class="source-note">Source : SeLoger / Meilleurs Agents. Loyers médians au m², charges non comprises. Données indicatives.</div>
  `;
  resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showNoData() {
  const resultCard = document.getElementById('result-card');
  resultCard.style.display = 'block';
  resultCard.innerHTML = `<div class="no-data-msg">Données insuffisantes pour ce quartier et ce type de bien.</div>`;
}
</script>
