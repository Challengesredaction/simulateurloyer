<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulateur loyer – Challenges</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --red: #f43423;
  --dark: #1a1a1a;
  --mid: #555;
  --light: #f5f3f0;
  --border: #e0dbd5;
  --green: #1a7a4a;
  --font: 'Lora', serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--light); color: var(--dark); min-height: 100vh; }

.container { max-width: 680px; margin: 48px auto; padding: 0 20px 60px; }

.title-block { margin-bottom: 36px; }
.main-title {
  font-size: clamp(26px, 5vw, 40px);
  font-weight: 700;
  line-height: 1.15;
  color: var(--red);
  margin-bottom: 14px;
}
.subtitle { font-size: 15px; color: var(--mid); line-height: 1.65; font-weight: 400; }

.form-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 32px;
  margin-bottom: 24px;
}
.field-group { margin-bottom: 24px; }
.field-group:last-child { margin-bottom: 0; }

label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--mid);
  margin-bottom: 8px;
}

/* Toggle appartement / maison */
.type-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 3px; overflow: hidden; }
.type-toggle input[type="radio"] { display: none; }
.type-toggle label {
  flex: 1; text-align: center; padding: 11px;
  font-size: 14px; font-weight: 500; letter-spacing: 0; text-transform: none;
  color: var(--mid); cursor: pointer; background: var(--light); transition: all .15s; margin: 0;
}
.type-toggle input[type="radio"]:checked + label { background: var(--red); color: white; }

/* Autocomplete shared */
.ac-wrap { position: relative; }
.ac-input {
  width: 100%; padding: 13px 16px;
  font-family: var(--font); font-size: 15px; font-weight: 400;
  color: var(--dark); background: var(--light);
  border: 1.5px solid var(--border); border-radius: 3px;
  outline: none; transition: border-color .15s;
}
.ac-input:focus { border-color: var(--dark); }
.ac-input:disabled { opacity: .45; cursor: not-allowed; }
.ac-input::placeholder { color: #bbb; font-style: italic; }

.ac-drop {
  display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white; border: 1.5px solid var(--dark); border-radius: 3px;
  max-height: 280px; overflow-y: auto; z-index: 200;
  box-shadow: 0 8px 28px rgba(0,0,0,.13);
}
.ac-drop.open { display: block; }
.ac-group {
  padding: 7px 14px 4px; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--red);
  background: white; position: sticky; top: 0;
  border-bottom: 1px solid var(--border);
}
.ac-item {
  padding: 10px 16px; font-size: 14px; cursor: pointer;
  color: var(--dark); transition: background .1s;
}
.ac-item:hover { background: var(--light); }
.ac-item.sel { background: #fff5f4; font-weight: 600; }
.ac-item mark { background: none; color: var(--red); font-weight: 700; }
.ac-cp { color: #aaa; font-size: 12px; margin-left: 8px; }

/* Row 2 cols */
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.input-unit { position: relative; }
.input-unit .ac-input { padding-right: 44px; }
.unit { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--mid); pointer-events: none; }

/* Button */
.btn {
  width: 100%; padding: 17px; margin-top: 8px;
  background: var(--red); color: white; border: none; border-radius: 3px;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  letter-spacing: .5px; text-transform: uppercase; cursor: pointer; transition: background .15s;
}
.btn:hover { background: #d42f1f; }
.btn:disabled { background: #ccc; cursor: not-allowed; }

/* Result */
.result-card { display: none; background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; animation: fadeUp .3s ease; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.r-banner { padding: 24px 32px; display: flex; align-items: center; gap: 18px; }
.r-banner.above { background:#fff5f4; border-bottom: 3px solid var(--red); }
.r-banner.below { background:#f4fff8; border-bottom: 3px solid var(--green); }
.r-banner.equal { background:#fffbf4; border-bottom: 3px solid #d4a00a; }
.r-icon { font-size: 38px; flex-shrink: 0; }
.r-verdict { font-size: 20px; font-weight: 700; line-height: 1.2; margin-bottom: 5px; }
.r-verdict.above { color: var(--red); }
.r-verdict.below { color: var(--green); }
.r-verdict.equal { color: #d4a00a; }
.r-detail { font-size: 14px; color: var(--mid); line-height: 1.55; }
.r-stats { padding: 24px 32px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; border-bottom: 1px solid var(--border); }
.stat { text-align: center; }
.stat-val { font-size: 26px; font-weight: 700; display: block; margin-bottom: 4px; }
.stat-lbl { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--mid); }
.r-bar { padding: 22px 32px 28px; }
.bar-title { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--mid); margin-bottom: 14px; }
.bar-wrap { position: relative; height: 36px; }
.bar-track { height: 8px; background: var(--border); border-radius: 4px; position: absolute; left:0;right:0;top:50%;transform:translateY(-50%); }
.bar-fill { height: 8px; border-radius: 4px; position: absolute; left:0;top:50%;transform:translateY(-50%); transition: width .6s ease; }
.bar-fill.above { background: var(--red); }
.bar-fill.below { background: var(--green); }
.bar-fill.equal { background: #d4a00a; }
.bar-marker { position: absolute; top:0; transform:translateX(-50%); text-align:center; pointer-events:none; }
.bar-marker-line { width:2px;height:36px;margin:0 auto;opacity:.35;background:var(--dark); }
.bar-marker-lbl { position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;color:var(--mid);white-space:nowrap; }
.bar-ends { display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--mid); }
.source { padding: 0 32px 18px; font-size: 11px; color: #aaa; text-align: center; line-height: 1.5; }
.nodata { padding: 22px 32px; color: var(--mid); font-style: italic; font-size: 14px; }

@media (max-width: 520px) {
  .form-card { padding: 22px 18px; }
  .row2 { grid-template-columns: 1fr; }
  .r-stats { grid-template-columns: 1fr 1fr; }
  .r-banner, .r-bar, .r-stats { padding-left: 18px; padding-right: 18px; }
}
</style>
</head>

    <h1 class="main-title">Payez-vous votre loyer trop cher&nbsp;?</h1>

    <div class="field-group">

    </div>

    <div class="row2">
      <div class="field-group">
        <label for="loyer-input">Loyer mensuel</label>

          <input class="ac-input" id="loyer-input" type="number" placeholder="ex. 950" min="1" max="20000">
          <span class="unit">€</span>
        </div>
      </div>
      <div class="field-group">
        <label for="surface-input">Surface</label>

          <input class="ac-input" id="surface-input" type="number" placeholder="ex. 45" min="1" max="1000">

        </div>
      </div>
    </div>

    <button class="btn" id="btn-calc" disabled onclick="simulate()">Calculer</button>
  </div>

  <div class="result-card" id="result"></div>
</div>

// ── State ──────────────────────────────────────────────
let selVille = null;   // full city object
let selQuartier = null; // { value, label, loyer_appart, loyer_maison }

// ── DOM refs ───────────────────────────────────────────
const villeInput    = document.getElementById('ville-input');
const villeDrop     = document.getElementById('ville-drop');
const quartierInput = document.getElementById('quartier-input');
const quartierDrop  = document.getElementById('quartier-drop');
const loyerInput    = document.getElementById('loyer-input');
const surfaceInput  = document.getElementById('surface-input');
const btnCalc       = document.getElementById('btn-calc');

// ── Helpers ────────────────────────────────────────────
function highlight(text, query) {
  if (!query) return document.createTextNode(text);
  const i = text.toLowerCase().indexOf(query.toLowerCase());
  if (i < 0) return document.createTextNode(text);
  const span = document.createElement('span');
  span.appendChild(document.createTextNode(text.slice(0, i)));
  const mark = document.createElement('mark');
  mark.textContent = text.slice(i, i + query.length);
  span.appendChild(mark);
  span.appendChild(document.createTextNode(text.slice(i + query.length)));
  return span;
}

function openDrop(drop) { drop.classList.add('open'); }
function closeDrop(drop) { drop.classList.remove('open'); }
function clearDrop(drop) { drop.innerHTML = ''; closeDrop(drop); }

function addGroupHeader(drop, text) {
  const d = document.createElement('div');
  d.className = 'ac-group';
  d.textContent = text;
  drop.appendChild(d);
}

function addItem(drop, label, query, onSelect, isSelected) {
  const d = document.createElement('div');
  d.className = 'ac-item' + (isSelected ? ' sel' : '');
  d.appendChild(highlight(label, query));
  d.addEventListener('mousedown', e => { e.preventDefault(); onSelect(); });
  drop.appendChild(d);
}

function checkReady() {
  btnCalc.disabled = !(selVille && selQuartier &&
    parseFloat(loyerInput.value) > 0 && parseFloat(surfaceInput.value) > 0);
}

// ── Ville autocomplete ─────────────────────────────────
villeInput.addEventListener('input', () => {
  const q = villeInput.value.trim();
  selVille = null;
  selQuartier = null;
  resetQuartier();
  clearDrop(villeDrop);
  if (q.length < 1) { checkReady(); return; }

  const matches = DATA.filter(c => c.ville.toLowerCase().includes(q.toLowerCase())).slice(0, 35);
  if (!matches.length) { checkReady(); return; }

  matches.forEach(city => {
    const d = document.createElement('div');
    d.className = 'ac-item';
    d.appendChild(highlight(city.ville, q));
    if (city.cp) {
      const cp = document.createElement('span');
      cp.className = 'ac-cp';
      cp.textContent = city.cp;
      d.appendChild(cp);
    }
    d.addEventListener('mousedown', e => {
      e.preventDefault();
      pickVille(city);
    });
    villeDrop.appendChild(d);
  });
  openDrop(villeDrop);
  checkReady();
});

villeInput.addEventListener('blur', () => setTimeout(() => closeDrop(villeDrop), 150));

function pickVille(city) {
  selVille = city;
  villeInput.value = city.ville;
  closeDrop(villeDrop);
  resetQuartier();
  populateQuartierDrop('');
  quartierInput.disabled = false;
  quartierInput.placeholder = city.quartiers.length
    ? 'Tapez ou cliquez pour voir les quartiers…'
    : 'Pas de quartier disponible — moyenne ville uniquement';
  checkReady();
}

// ── Quartier autocomplete ──────────────────────────────
function resetQuartier() {
  selQuartier = null;
  quartierInput.value = '';
  quartierInput.disabled = true;
  quartierInput.placeholder = "Sélectionnez d'abord une ville";
  clearDrop(quartierDrop);
  checkReady();
}

function getTypeField() {
  return document.querySelector('input[name="type"]:checked').value;
}

function buildQuartierItems() {
  if (!selVille) return [];
  const field = getTypeField() === 'appart' ? 'loyer_appart' : 'loyer_maison';

  // Always include city-wide average first
  const items = [{
    value: '__ville__',
    label: selVille.ville + ' — moyenne toute la ville',
    group: null,
    loyer_appart: selVille.avg_appart,
    loyer_maison: selVille.avg_maison
  }];

  // Group quartiers
  const groups = {};
  selVille.quartiers.forEach(q => {
    if (q[field] == null) return;
    const g = q.group || '__flat__';
    if (!groups[g]) groups[g] = [];
    groups[g].push(q);
  });

  Object.entries(groups).forEach(([g, qs]) => {
    qs.forEach(q => {
      items.push({
        value: q.nom,
        label: q.nom,
        group: g === '__flat__' ? null : g,
        loyer_appart: q.loyer_appart,
        loyer_maison: q.loyer_maison
      });
    });
  });

  return items;
}

function populateQuartierDrop(query) {
  clearDrop(quartierDrop);
  const items = buildQuartierItems();
  const q = query.toLowerCase();
  const filtered = q ? items.filter(i => i.label.toLowerCase().includes(q)) : items;
  if (!filtered.length) return;

  let lastGroup = undefined;
  filtered.forEach(item => {
    if (item.group !== lastGroup) {
      if (item.group) addGroupHeader(quartierDrop, item.group);
      lastGroup = item.group;
    }
    addItem(quartierDrop, item.label, query,
      () => pickQuartier(item),
      selQuartier && selQuartier.value === item.value
    );
  });
  openDrop(quartierDrop);
}

quartierInput.addEventListener('focus', () => {
  if (selVille) populateQuartierDrop(quartierInput.value);
});

quartierInput.addEventListener('input', () => {
  selQuartier = null;
  checkReady();
  if (selVille) populateQuartierDrop(quartierInput.value);
});

quartierInput.addEventListener('blur', () => setTimeout(() => closeDrop(quartierDrop), 150));

function pickQuartier(item) {
  selQuartier = item;
  quartierInput.value = item.label;
  closeDrop(quartierDrop);
  checkReady();
}

// Re-populate when type changes
document.querySelectorAll('input[name="type"]').forEach(r => {
  r.addEventListener('change', () => {
    selQuartier = null;
    quartierInput.value = '';
    clearDrop(quartierDrop);
    if (selVille) {
      quartierInput.disabled = false;
      populateQuartierDrop('');
    }
    checkReady();
  });
});

loyerInput.addEventListener('input', checkReady);
surfaceInput.addEventListener('input', checkReady);

// ── Simulate ───────────────────────────────────────────
function simulate() {
  const loyer = parseFloat(loyerInput.value);
  const surface = parseFloat(surfaceInput.value);
  const type = getTypeField();
  const field = type === 'appart' ? 'loyer_appart' : 'loyer_maison';

  const loyerM2 = loyer / surface;
  const reference = selQuartier[field];
  const label = selQuartier.value === '__ville__'
    ? 'moyenne de ' + selVille.ville
    : 'moyenne du quartier ' + selQuartier.label;

  if (!reference) { showNoData(); return; }

  const diff = loyerM2 - reference;
  const pct = (diff / reference) * 100;
  const threshold = 5;

  let status, icon, verdict, detail;
  if (pct > threshold) {
    status = 'above'; icon = '⚠️';
    verdict = 'Vous payez plus cher que la moyenne';
    detail = `Votre loyer est <strong>${pct > 0 ? '+' : ''}${pct.toFixed(1)}%</strong> au-dessus de la ${label} (${reference.toFixed(2)} €/m²).`;
  } else if (pct < -threshold) {
    status = 'below'; icon = '✅';
    verdict = 'Vous êtes en dessous du marché';
    detail = `Votre loyer est <strong>${pct.toFixed(1)}%</strong> en dessous de la ${label} (${reference.toFixed(2)} €/m²). Bonne affaire.`;
  } else {
    status = 'equal'; icon = '🎯';
    verdict = 'Vous êtes dans la moyenne';
    detail = `Votre loyer correspond à la ${label} (${reference.toFixed(2)} €/m²).`;
  }

  const min = Math.min(loyerM2, reference) * 0.7;
  const max = Math.max(loyerM2, reference) * 1.2;
  const range = max - min;
  const uPct = Math.min(93, Math.max(5, ((loyerM2 - min) / range) * 100));
  const rPct = Math.min(93, Math.max(5, ((reference - min) / range) * 100));
  const col = status === 'above' ? 'var(--red)' : status === 'below' ? 'var(--green)' : '#d4a00a';

  const el = document.getElementById('result');
  el.style.display = 'block';
  el.innerHTML = `
    <div class="r-banner ${status}">
      <div class="r-icon">${icon}</div>
      <div>
        <div class="r-verdict ${status}">${verdict}</div>
        <div class="r-detail">${detail}</div>
      </div>
    </div>
    <div class="r-stats">
      <div class="stat">
        <span class="stat-val" style="color:var(--red)">${loyerM2.toFixed(2)} €</span>
        <span class="stat-lbl">Votre loyer/m²</span>
      </div>
      <div class="stat">
        <span class="stat-val">${reference.toFixed(2)} €</span>
        <span class="stat-lbl">Référence marché</span>
      </div>
      <div class="stat">
        <span class="stat-val" style="color:${col}">${diff > 0 ? '+' : ''}${diff.toFixed(2)} €</span>
        <span class="stat-lbl">Écart /m²</span>
      </div>
    </div>
    <div class="r-bar">
      <div class="bar-title">Positionnement de votre loyer</div>
      <div class="bar-wrap">
        <div class="bar-track"></div>
        <div class="bar-fill ${status}" style="width:${Math.max(uPct,rPct)}%"></div>
        <div class="bar-marker" style="left:${rPct}%">
          <div class="bar-marker-lbl">Référence</div>
          <div class="bar-marker-line"></div>
        </div>
        <div class="bar-marker" style="left:${uPct}%">
          <div class="bar-marker-lbl" style="color:${col}">Vous</div>
          <div class="bar-marker-line" style="background:${col};opacity:.8"></div>
        </div>
      </div>
      <div class="bar-ends"><span>${min.toFixed(1)} €/m²</span><span>${max.toFixed(1)} €/m²</span></div>
    </div>
    <div class="source">Source : SeLoger / Meilleurs Agents – Loyers médians au m², charges non comprises. Données mars 2026.</div>
  `;
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showNoData() {
  const el = document.getElementById('result');
  el.style.display = 'block';
  el.innerHTML = '<div class="nodata">Données insuffisantes pour ce type de bien dans ce quartier.</div>';
}
</script>
</body>
</html>
